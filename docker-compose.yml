version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: hrrepozik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hrrepozik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - hrrepozik_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hrrepozik']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hrrepozik_pg_data:
